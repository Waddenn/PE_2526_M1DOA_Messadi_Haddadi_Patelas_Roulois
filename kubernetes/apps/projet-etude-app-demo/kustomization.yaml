apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Labels communs propagés à toutes les ressources, sans toucher aux selectors
# (immutables sur Deployment / StatefulSet — un commonLabels classique casserait).
labels:
- includeSelectors: false
  includeTemplates: false
  pairs:
    app.kubernetes.io/part-of: projet-etude
    app.kubernetes.io/managed-by: argocd
resources:
- database.yaml
- deployment-api.yaml
- deployment-worker.yaml
- service.yaml
- service-worker.yaml
- hpa.yaml
- hpa-worker.yaml
- ingress.yaml
- servicemonitor.yaml
- servicemonitor-worker.yaml
- prometheusrule.yaml
- networkpolicy.yaml
- pdb.yaml
- chaos.yaml
- cronjob-audit-purge.yaml
- externalsecrets.yaml
- dashboard.yaml
- dashboard-slo.yaml
- dashboard-worker.yaml
- dashboard-kpi.yaml
images:
- name: ghcr.io/waddenn/projet-etude-app-demo-api
  digest: sha256:a627b55b7fa300907335cef26d10ded1564b5f8d07b005c8938d82d34ee1aea9
- name: ghcr.io/waddenn/projet-etude-app-demo-worker
  digest: sha256:3b906b96c49ca40c461df5345efbfe246adb427151ea25a193ccffc7c70069ad
- name: ghcr.io/waddenn/projet-etude-app-demo-audit-purge
  newTag: main
