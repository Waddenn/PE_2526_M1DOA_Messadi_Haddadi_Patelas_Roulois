apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Labels communs propagés à toutes les ressources, sans toucher aux selectors
# (immutables sur Deployment / StatefulSet — un commonLabels classique casserait).
labels:
- includeSelectors: false
  includeTemplates: false
  pairs:
    app.kubernetes.io/part-of: projet-etude
    app.kubernetes.io/managed-by: argocd
resources:
- database.yaml
- deployment-api.yaml
- deployment-worker.yaml
- service.yaml
- service-worker.yaml
- hpa.yaml
- hpa-worker.yaml
- ingress.yaml
- servicemonitor.yaml
- servicemonitor-worker.yaml
- prometheusrule.yaml
- networkpolicy.yaml
- pdb.yaml
- chaos.yaml
- cronjob-audit-purge.yaml
- externalsecrets.yaml
- dashboard.yaml
- dashboard-slo.yaml
- dashboard-worker.yaml
- dashboard-kpi.yaml
images:
- name: ghcr.io/waddenn/projet-etude-app-demo-api
  digest: sha256:b3eac7cd59b17104dbd21616cb99b63f042ac773adbb12563ac89b06c2fa1f37
- name: ghcr.io/waddenn/projet-etude-app-demo-worker
  digest: sha256:d958d623bbbef86f063bbcdb0263de7e2dd74184992d8a3e62bb6990eb18c35e
- name: ghcr.io/waddenn/projet-etude-app-demo-audit-purge
  newTag: main
